---
name: DevSecOps Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  ansible-lint:
    name: Ansible Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installer ansible et collections
        run: |
          pip install ansible ansible-lint
          ansible-galaxy collection install ansible.posix community.general

      - name: Lancer ansible-lint
        run: ansible-lint playbooks/ roles/

  bandit:
    name: Bandit SAST
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installer Bandit
        run: pip install bandit

      - name: Lancer Bandit
        run: bandit -r app/ -ll

  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Lancer Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/python
            p/dockerfile
            p/ansible

  trivy:
    name: Trivy CVE Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Builder les images avec docker compose
        run: docker compose -f app/docker-compose.yml build

      - name: Scanner customer
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: app-customer:latest
          format: table
          exit-code: '1'
          severity: HIGH,CRITICAL
          ignore-unfixed: true

      - name: Scanner waiter
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: app-waiter:latest
          format: table
          exit-code: '1'
          severity: HIGH,CRITICAL
          ignore-unfixed: true

      - name: Scanner kitchen
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: app-kitchen:latest
          format: table
          exit-code: '1'
          severity: HIGH,CRITICAL
          ignore-unfixed: true

      - name: Scanner payment
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: app-payment:latest
          format: table
          exit-code: '1'
          severity: HIGH,CRITICAL
          ignore-unfixed: true

      - name: Scanner reservation
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: app-reservation:latest
          format: table
          exit-code: '1'
          severity: HIGH,CRITICAL
          ignore-unfixed: true

  build-and-sign:
    name: Build Sign and Push to Harbor
    runs-on: ubuntu-latest
    needs: [ansible-lint, bandit, semgrep, trivy]
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Login Harbor
        env:
          HARBOR_USER: ${{ secrets.HARBOR_USER }}
          HARBOR_PASSWORD: ${{ secrets.HARBOR_PASSWORD }}
        run: echo "$HARBOR_PASSWORD" | docker login frhb102257flex.ikexpress.com -u "$HARBOR_USER" --password-stdin

      - name: Installer Cosign
        uses: sigstore/cosign-installer@v3

      - name: Build et push customer
        run: |
          docker build -t frhb102257flex.ikexpress.com/restaurant/customer:latest \
            -f app/customer/Dockerfile app/
          docker push frhb102257flex.ikexpress.com/restaurant/customer:latest

      - name: Signer customer avec Cosign keyless
        run: cosign sign --yes frhb102257flex.ikexpress.com/restaurant/customer:latest

      - name: Build et push waiter
        run: |
          docker build -t frhb102257flex.ikexpress.com/restaurant/waiter:latest \
            -f app/waiter/Dockerfile app/
          docker push frhb102257flex.ikexpress.com/restaurant/waiter:latest

      - name: Signer waiter avec Cosign keyless
        run: cosign sign --yes frhb102257flex.ikexpress.com/restaurant/waiter:latest

      - name: Build et push kitchen
        run: |
          docker build -t frhb102257flex.ikexpress.com/restaurant/kitchen:latest \
            -f app/kitchen/Dockerfile app/
          docker push frhb102257flex.ikexpress.com/restaurant/kitchen:latest

      - name: Signer kitchen avec Cosign keyless
        run: cosign sign --yes frhb102257flex.ikexpress.com/restaurant/kitchen:latest

      - name: Build et push payment
        run: |
          docker build -t frhb102257flex.ikexpress.com/restaurant/payment:latest \
            -f app/payment/Dockerfile app/
          docker push frhb102257flex.ikexpress.com/restaurant/payment:latest

      - name: Signer payment avec Cosign keyless
        run: cosign sign --yes frhb102257flex.ikexpress.com/restaurant/payment:latest

      - name: Build et push reservation
        run: |
          docker build -t frhb102257flex.ikexpress.com/restaurant/reservation:latest \
            -f app/reservation/Dockerfile app/
          docker push frhb102257flex.ikexpress.com/restaurant/reservation:latest

      - name: Signer reservation avec Cosign keyless
        run: cosign sign --yes frhb102257flex.ikexpress.com/restaurant/reservation:latest

  openscap-before:
    name: OpenSCAP AVANT hardening — VM2
    runs-on: ubuntu-latest
    needs: [build-and-sign]
    steps:
      - name: Configurer la clé SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VM1_SSH_KEY }}" > ~/.ssh/id_ed25519_ci
          chmod 600 ~/.ssh/id_ed25519_ci
          ssh-keyscan ${{ secrets.VM1_HOST }} >> ~/.ssh/known_hosts

      - name: Installer OpenSCAP et SSG sur VM2
        run: |
          ssh -i ~/.ssh/id_ed25519_ci ${{ secrets.VM1_USER }}@${{ secrets.VM1_HOST }} \
          'ssh -i ~/.ssh/id_ed25519_ansible -o StrictHostKeyChecking=no \
           ansible@${{ secrets.VM2_HOST }} \
           "sudo apt update -y && sudo apt install -y openscap-scanner unzip && \
            [ -f ~/ssg/scap-security-guide-0.1.81/ssg-ubuntu2404-ds.xml ] || \
            (wget -q https://github.com/ComplianceAsCode/content/releases/download/v0.1.81/scap-security-guide-0.1.81.zip \
             -O ~/ssg.zip && unzip -q ~/ssg.zip -d ~/ssg/)"'

      - name: Scan CIS AVANT hardening
        run: |
          ssh -i ~/.ssh/id_ed25519_ci ${{ secrets.VM1_USER }}@${{ secrets.VM1_HOST }} \
          'ssh -i ~/.ssh/id_ed25519_ansible -o StrictHostKeyChecking=no \
           ansible@${{ secrets.VM2_HOST }} \
           "sudo oscap xccdf eval \
             --profile xccdf_org.ssgproject.content_profile_cis_level1_server \
             --results /tmp/cis-before.xml \
             ~/ssg/scap-security-guide-0.1.81/ssg-ubuntu2404-ds.xml; \
            SCORE=\$(grep -o '"'"'<score[^>]*>[0-9.]*'"'"' /tmp/cis-before.xml | grep -o '"'"'[0-9.]*$'"'"' | head -1); \
            echo \"=== Score CIS AVANT hardening : \$SCORE ===\"; \
            printf '"'"'cis_score %s\n'"'"' \"\$SCORE\" | \
            curl --data-binary @- http://178.170.25.223:30091/metrics/job/openscap/instance/vm2-before"'

  openscap-before-vm3:
    name: OpenSCAP AVANT hardening — VM3
    runs-on: ubuntu-latest
    needs: [build-and-sign]
    steps:
      - name: Configurer la clé SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VM1_SSH_KEY }}" > ~/.ssh/id_ed25519_ci
          chmod 600 ~/.ssh/id_ed25519_ci
          ssh-keyscan ${{ secrets.VM1_HOST }} >> ~/.ssh/known_hosts

      - name: Installer OpenSCAP et SSG sur VM3
        run: |
          ssh -i ~/.ssh/id_ed25519_ci ${{ secrets.VM1_USER }}@${{ secrets.VM1_HOST }} \
          'ssh -i ~/.ssh/id_ed25519_ansible -o StrictHostKeyChecking=no \
           ansible@${{ secrets.VM3_HOST }} \
           "sudo apt update -y && sudo apt install -y openscap-scanner unzip && \
            [ -f ~/ssg/scap-security-guide-0.1.81/ssg-ubuntu2404-ds.xml ] || \
            (wget -q https://github.com/ComplianceAsCode/content/releases/download/v0.1.81/scap-security-guide-0.1.81.zip \
             -O ~/ssg.zip && unzip -q ~/ssg.zip -d ~/ssg/)"'

      - name: Scan CIS AVANT hardening VM3
        run: |
          ssh -i ~/.ssh/id_ed25519_ci ${{ secrets.VM1_USER }}@${{ secrets.VM1_HOST }} \
          'ssh -i ~/.ssh/id_ed25519_ansible -o StrictHostKeyChecking=no \
           ansible@${{ secrets.VM3_HOST }} \
           "sudo oscap xccdf eval \
             --profile xccdf_org.ssgproject.content_profile_cis_level1_server \
             --results /tmp/cis-before.xml \
             ~/ssg/scap-security-guide-0.1.81/ssg-ubuntu2404-ds.xml; \
            SCORE=\$(grep -o '"'"'<score[^>]*>[0-9.]*'"'"' /tmp/cis-before.xml | grep -o '"'"'[0-9.]*$'"'"' | head -1); \
            echo \"=== Score CIS AVANT hardening VM3 : \$SCORE ===\"; \
            printf '"'"'cis_score %s\n'"'"' \"\$SCORE\" | \
            curl --data-binary @- http://178.170.25.223:30091/metrics/job/openscap/instance/vm3-before"'

  deploy:
    name: Deploy via Ansible
    runs-on: ubuntu-latest
    needs: [openscap-before, openscap-before-vm3]
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Configurer la clé SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VM1_SSH_KEY }}" > ~/.ssh/id_ed25519_ci
          chmod 600 ~/.ssh/id_ed25519_ci
          ssh-keyscan ${{ secrets.VM1_HOST }} >> ~/.ssh/known_hosts

      - name: Git pull sur VM1
        run: |
          ssh -i ~/.ssh/id_ed25519_ci ${{ secrets.VM1_USER }}@${{ secrets.VM1_HOST }} \
          "cd ~/Ynov-k3s && git pull https://${{ secrets.GH_TOKEN }}@github.com/Heimlesss/Ynov-k3s.git"

      - name: Déployer le hardening CIS et k3s via Ansible
        run: |
          ssh -i ~/.ssh/id_ed25519_ci ${{ secrets.VM1_USER }}@${{ secrets.VM1_HOST }} \
          'cd ~/Ynov-k3s && \
           ansible-playbook playbooks/harden.yml --private-key ~/.ssh/id_ed25519_ansible && \
           ansible-playbook playbooks/k3s.yml --private-key ~/.ssh/id_ed25519_ansible'

  deploy-monitoring:
    name: Deploy Monitoring Stack
    runs-on: ubuntu-latest
    needs: [deploy]
    steps:
      - name: Configurer la clé SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VM1_SSH_KEY }}" > ~/.ssh/id_ed25519_ci
          chmod 600 ~/.ssh/id_ed25519_ci
          ssh-keyscan ${{ secrets.VM1_HOST }} >> ~/.ssh/known_hosts

      - name: Déployer la stack monitoring via Ansible
        env:
          GRAFANA_USER: ${{ secrets.GRAFANA_USER }}
          GRAFANA_PASSWORD: ${{ secrets.GRAFANA_PASSWORD }}
        run: |
          VARS_B64=$(python3 -c "import json,os,base64; print(base64.b64encode(json.dumps({'grafana_user':os.environ['GRAFANA_USER'],'grafana_password':os.environ['GRAFANA_PASSWORD']}).encode()).decode())")
          ssh -i ~/.ssh/id_ed25519_ci ${{ secrets.VM1_USER }}@${{ secrets.VM1_HOST }} \
            "echo ${VARS_B64} | base64 -d > /tmp/grafana_vars.json && \
             cd ~/Ynov-k3s && \
             ansible-playbook playbooks/monitoring.yml \
               --private-key ~/.ssh/id_ed25519_ansible \
               --extra-vars @/tmp/grafana_vars.json ; \
             rm -f /tmp/grafana_vars.json"

  deploy-apps:
    name: Deploy Restaurant App
    runs-on: ubuntu-latest
    needs: [deploy]
    steps:
      - name: Configurer la clé SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VM1_SSH_KEY }}" > ~/.ssh/id_ed25519_ci
          chmod 600 ~/.ssh/id_ed25519_ci
          ssh-keyscan ${{ secrets.VM1_HOST }} >> ~/.ssh/known_hosts

      - name: Déployer l'app restaurant sur k3s
        run: |
          ssh -i ~/.ssh/id_ed25519_ci ${{ secrets.VM1_USER }}@${{ secrets.VM1_HOST }} \
          'ssh -i ~/.ssh/id_ed25519_ansible -o StrictHostKeyChecking=no \
           ansible@${{ secrets.VM2_HOST }} \
           "sudo kubectl apply -f ~/manifests/ -n restaurant"'

  openscap-after:
    name: OpenSCAP APRÈS hardening — VM2
    runs-on: ubuntu-latest
    needs: [deploy, deploy-monitoring]
    steps:
      - name: Configurer la clé SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VM1_SSH_KEY }}" > ~/.ssh/id_ed25519_ci
          chmod 600 ~/.ssh/id_ed25519_ci
          ssh-keyscan ${{ secrets.VM1_HOST }} >> ~/.ssh/known_hosts

      - name: Scan CIS APRÈS hardening et push score
        run: |
          ssh -i ~/.ssh/id_ed25519_ci ${{ secrets.VM1_USER }}@${{ secrets.VM1_HOST }} \
          'ssh -i ~/.ssh/id_ed25519_ansible -o StrictHostKeyChecking=no \
           ansible@${{ secrets.VM2_HOST }} \
           "sudo oscap xccdf eval \
             --profile xccdf_org.ssgproject.content_profile_cis_level1_server \
             --results /tmp/cis-after.xml \
             ~/ssg/scap-security-guide-0.1.81/ssg-ubuntu2404-ds.xml; \
            SCORE=\$(grep -o '"'"'<score[^>]*>[0-9.]*'"'"' /tmp/cis-after.xml | grep -o '"'"'[0-9.]*$'"'"' | head -1); \
            echo \"=== Score CIS APRÈS hardening : \$SCORE ===\"; \
            printf '"'"'cis_score %s\n'"'"' \"\$SCORE\" | \
            curl --data-binary @- http://178.170.25.223:30091/metrics/job/openscap/instance/vm2-after"'

  openscap-after-vm3:
    name: OpenSCAP APRÈS hardening — VM3
    runs-on: ubuntu-latest
    needs: [deploy, deploy-monitoring]
    steps:
      - name: Configurer la clé SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VM1_SSH_KEY }}" > ~/.ssh/id_ed25519_ci
          chmod 600 ~/.ssh/id_ed25519_ci
          ssh-keyscan ${{ secrets.VM1_HOST }} >> ~/.ssh/known_hosts

      - name: Scan CIS APRÈS hardening VM3 et push score
        run: |
          ssh -i ~/.ssh/id_ed25519_ci ${{ secrets.VM1_USER }}@${{ secrets.VM1_HOST }} \
          'ssh -i ~/.ssh/id_ed25519_ansible -o StrictHostKeyChecking=no \
           ansible@${{ secrets.VM3_HOST }} \
           "sudo oscap xccdf eval \
             --profile xccdf_org.ssgproject.content_profile_cis_level1_server \
             --results /tmp/cis-after.xml \
             ~/ssg/scap-security-guide-0.1.81/ssg-ubuntu2404-ds.xml; \
            SCORE=\$(grep -o '"'"'<score[^>]*>[0-9.]*'"'"' /tmp/cis-after.xml | grep -o '"'"'[0-9.]*$'"'"' | head -1); \
            echo \"=== Score CIS APRÈS hardening VM3 : \$SCORE ===\"; \
            printf '"'"'cis_score %s\n'"'"' \"\$SCORE\" | \
            curl --data-binary @- http://178.170.25.223:30091/metrics/job/openscap/instance/vm3-after"'

  zap:
    name: ZAP Baseline DAST
    runs-on: ubuntu-latest
    needs: [deploy-monitoring]
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: 'http://178.170.25.223:30001'
          fail_action: false
          allow_issue_writing: false
          artifact_name: zap-report