apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose convert -f /home/ansible/docker-compose.deploy.yml -o /home/ansible/manifests/
    kompose.version: 1.32.0 (765fde254)
  labels:
    io.kompose.service: customer
  name: customer
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: customer
  template:
    metadata:
      annotations:
        kompose.cmd: kompose convert -f /home/ansible/docker-compose.deploy.yml -o /home/ansible/manifests/
        kompose.version: 1.32.0 (765fde254)
      labels:
        io.kompose.network/ansible-restaurant-network: "true"
        io.kompose.service: customer
    spec:
      containers:
        - env:
            - name: DB_URL
              value: postgresql://userdb:7ab,%@ck8D^j?!t/@db:5432/restaurant
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://traces:4317
            - name: OTEL_SERVICE_NAME
              value: customer_service
            - name: PAYMENT_URL
              value: http://payment:5003
            - name: PYTHONPATH
              value: /app
            - name: RABBITMQ_URL
              value: amqp://guest:guest@rabbitmq:5672/
            - name: REDIS_URL
              value: redis://redis:6379
            - name: RESERVATION_URL
              value: http://reservation:5004
            - name: WAITER_URL
              value: http://waiter:5001
          image: llynov-k3s.duckdns.org/restaurant/customer:latest
          name: customer-service
      restartPolicy: Always
