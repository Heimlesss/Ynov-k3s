apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: restaurant
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s

    scrape_configs:
      - job_name: 'pushgateway'
        static_configs:
          - targets: ['pushgateway.restaurant.svc.cluster.local:9091']
        honor_labels: true

      - job_name: 'node-exporter'
        static_configs:
          - targets: ['node-exporter.restaurant.svc.cluster.local:9100']

      - job_name: 'node-exporter-vm3'
        static_configs:
          - targets: ['178.170.25.242:9100']

      - job_name: 'kube-state-metrics'
        static_configs:
          - targets: ['kube-state-metrics.restaurant.svc.cluster.local:8080']
