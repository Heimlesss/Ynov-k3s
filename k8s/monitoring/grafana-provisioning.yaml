apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: restaurant
data:
  prometheus.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        url: http://prometheus.restaurant.svc.cluster.local:9090
        isDefault: true
        editable: false
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
  namespace: restaurant
data:
  default.yaml: |
    apiVersion: 1
    providers:
      - name: default
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-ynov
  namespace: restaurant
data:
  ynov-k3s.json: |
    {
      "title": "Ynov-k3s DevSecOps",
      "uid": "ynov-k3s-devsecops",
      "schemaVersion": 38,
      "version": 1,
      "refresh": "30s",
      "time": { "from": "now-1h", "to": "now" },
      "panels": [
        {
          "id": 1,
          "title": "Score CIS AVANT hardening",
          "type": "stat",
          "gridPos": { "x": 0, "y": 0, "w": 6, "h": 4 },
          "targets": [{ "expr": "cis_score{status=\"avant_hardening\"}", "legendFormat": "Score avant" }],
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "background" },
          "fieldConfig": { "defaults": { "unit": "percent", "min": 0, "max": 100, "thresholds": { "mode": "absolute", "steps": [{ "color": "red", "value": null }, { "color": "orange", "value": 40 }, { "color": "yellow", "value": 60 }, { "color": "green", "value": 75 }] } } }
        },
        {
          "id": 2,
          "title": "Score CIS APRÈS hardening",
          "type": "stat",
          "gridPos": { "x": 6, "y": 0, "w": 6, "h": 4 },
          "targets": [{ "expr": "cis_score{status=\"apres_hardening\"}", "legendFormat": "Score après" }],
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "background" },
          "fieldConfig": { "defaults": { "unit": "percent", "min": 0, "max": 100, "thresholds": { "mode": "absolute", "steps": [{ "color": "red", "value": null }, { "color": "orange", "value": 40 }, { "color": "yellow", "value": 60 }, { "color": "green", "value": 75 }] } } }
        },
        {
          "id": 3,
          "title": "Amélioration CIS",
          "type": "stat",
          "gridPos": { "x": 12, "y": 0, "w": 6, "h": 4 },
          "targets": [{ "expr": "cis_score{status=\"apres_hardening\"} - cis_score{status=\"avant_hardening\"}", "legendFormat": "Delta" }],
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "background" },
          "fieldConfig": { "defaults": { "unit": "percent", "thresholds": { "mode": "absolute", "steps": [{ "color": "red", "value": null }, { "color": "orange", "value": 5 }, { "color": "green", "value": 15 }] } } }
        },
        {
          "id": 4,
          "title": "Évolution du score CIS",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 4, "w": 18, "h": 6 },
          "targets": [
            { "expr": "cis_score{status=\"avant_hardening\"}", "legendFormat": "Avant hardening" },
            { "expr": "cis_score{status=\"apres_hardening\"}", "legendFormat": "Après hardening" }
          ],
          "fieldConfig": { "defaults": { "unit": "percent", "min": 0, "max": 100, "custom": { "lineWidth": 2, "fillOpacity": 10 } }, "overrides": [{ "matcher": { "id": "byName", "options": "Avant hardening" }, "properties": [{ "id": "color", "value": { "fixedColor": "orange", "mode": "fixed" } }] }, { "matcher": { "id": "byName", "options": "Après hardening" }, "properties": [{ "id": "color", "value": { "fixedColor": "green", "mode": "fixed" } }] }] }
        },
        {
          "id": 10,
          "title": "CPU hôte",
          "type": "gauge",
          "gridPos": { "x": 0, "y": 10, "w": 6, "h": 4 },
          "targets": [{ "expr": "100 - (avg(rate(node_cpu_seconds_total{mode=\"idle\"}[5m])) * 100)", "legendFormat": "CPU %" }],
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] } },
          "fieldConfig": { "defaults": { "unit": "percent", "min": 0, "max": 100, "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "orange", "value": 70 }, { "color": "red", "value": 90 }] } } }
        },
        {
          "id": 11,
          "title": "Mémoire hôte",
          "type": "gauge",
          "gridPos": { "x": 6, "y": 10, "w": 6, "h": 4 },
          "targets": [{ "expr": "(1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100", "legendFormat": "RAM %" }],
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] } },
          "fieldConfig": { "defaults": { "unit": "percent", "min": 0, "max": 100, "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "orange", "value": 75 }, { "color": "red", "value": 90 }] } } }
        },
        {
          "id": 12,
          "title": "Disque hôte (/)",
          "type": "gauge",
          "gridPos": { "x": 12, "y": 10, "w": 6, "h": 4 },
          "targets": [{ "expr": "(1 - (node_filesystem_avail_bytes{mountpoint=\"/\"} / node_filesystem_size_bytes{mountpoint=\"/\"})) * 100", "legendFormat": "Disque %" }],
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] } },
          "fieldConfig": { "defaults": { "unit": "percent", "min": 0, "max": 100, "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "orange", "value": 70 }, { "color": "red", "value": 85 }] } } }
        },
        {
          "id": 13,
          "title": "Uptime hôte",
          "type": "stat",
          "gridPos": { "x": 0, "y": 14, "w": 6, "h": 3 },
          "targets": [{ "expr": "node_time_seconds - node_boot_time_seconds", "legendFormat": "Uptime" }],
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "background" },
          "fieldConfig": { "defaults": { "unit": "s", "thresholds": { "mode": "absolute", "steps": [{ "color": "blue", "value": null }] } } }
        },
        {
          "id": 14,
          "title": "CPU & RAM — historique",
          "type": "timeseries",
          "gridPos": { "x": 6, "y": 14, "w": 12, "h": 6 },
          "targets": [
            { "expr": "100 - (avg(rate(node_cpu_seconds_total{mode=\"idle\"}[5m])) * 100)", "legendFormat": "CPU %" },
            { "expr": "(1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100", "legendFormat": "RAM %" }
          ],
          "fieldConfig": { "defaults": { "unit": "percent", "min": 0, "max": 100, "custom": { "lineWidth": 2, "fillOpacity": 10 } } }
        },
        {
          "id": 20,
          "title": "Pods Running",
          "type": "stat",
          "gridPos": { "x": 0, "y": 20, "w": 4, "h": 3 },
          "targets": [{ "expr": "count(kube_pod_status_phase{phase=\"Running\"})", "legendFormat": "Running" }],
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "background" },
          "fieldConfig": { "defaults": { "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }] } } }
        },
        {
          "id": 21,
          "title": "Pods Pending",
          "type": "stat",
          "gridPos": { "x": 4, "y": 20, "w": 4, "h": 3 },
          "targets": [{ "expr": "count(kube_pod_status_phase{phase=\"Pending\"}) or vector(0)", "legendFormat": "Pending" }],
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "background" },
          "fieldConfig": { "defaults": { "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "orange", "value": 1 }] } } }
        },
        {
          "id": 22,
          "title": "Pods Failed",
          "type": "stat",
          "gridPos": { "x": 8, "y": 20, "w": 4, "h": 3 },
          "targets": [{ "expr": "count(kube_pod_status_phase{phase=\"Failed\"}) or vector(0)", "legendFormat": "Failed" }],
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "background" },
          "fieldConfig": { "defaults": { "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "red", "value": 1 }] } } }
        },
        {
          "id": 23,
          "title": "Deployments Ready",
          "type": "stat",
          "gridPos": { "x": 12, "y": 20, "w": 6, "h": 3 },
          "targets": [{ "expr": "sum(kube_deployment_status_replicas_ready)", "legendFormat": "Replicas ready" }],
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "background" },
          "fieldConfig": { "defaults": { "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }] } } }
        },
        {
          "id": 24,
          "title": "État des pods par namespace",
          "type": "table",
          "gridPos": { "x": 0, "y": 23, "w": 18, "h": 7 },
          "targets": [{ "expr": "kube_pod_status_phase", "legendFormat": "", "instant": true, "format": "table" }],
          "options": { "sortBy": [{ "desc": false, "displayName": "namespace" }] },
          "transformations": [{ "id": "filterFieldsByName", "options": { "include": { "names": ["namespace", "pod", "phase", "Value"] } } }]
        }
      ]
    }
