apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose convert -f /home/ansible/docker-compose.deploy.yml -o /home/ansible/manifests/
    kompose.version: 1.32.0 (765fde254)
  labels:
    io.kompose.service: db
  name: db
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: db
  template:
    metadata:
      annotations:
        kompose.cmd: kompose convert -f /home/ansible/docker-compose.deploy.yml -o /home/ansible/manifests/
        kompose.version: 1.32.0 (765fde254)
      labels:
        io.kompose.network/ansible-restaurant-network: "true"
        io.kompose.service: db
    spec:
      containers:
        - env:
            - name: POSTGRES_DB
              value: restaurant
            - name: POSTGRES_PASSWORD
              value: 7ab,%@ck8D^j?!t/
            - name: POSTGRES_USER
              value: userdb
          image: postgres:16
          name: restaurant-db
          ports:
            - containerPort: 5432
              hostPort: 5432
              protocol: TCP
      restartPolicy: Always
