---
# ============================================================
# Installation de k3s
# ============================================================

- name: "k3s | Vérifier si k3s est déjà installé"
  stat:
    path: /usr/local/bin/k3s
  register: k3s_binary

# stat     → vérifie si un fichier existe
# register → stocke le résultat dans une variable "k3s_binary"
# k3s_binary.stat.exists → true si le fichier existe, false sinon

- name: "k3s | Télécharger le script d'installation"
  get_url:
    url: "{{ k3s_install_url }}"
    dest: /tmp/k3s-install.sh
    mode: "0755"
  when: not k3s_binary.stat.exists

# get_url → télécharge un fichier depuis une URL
# mode: 0755 → rend le script exécutable
# when → uniquement si k3s n'est pas déjà installé

- name: "k3s | Installer k3s"
  command: /tmp/k3s-install.sh
  environment:
    INSTALL_K3S_VERSION: "{{ k3s_version }}"
    INSTALL_K3S_EXEC: "{{ k3s_server_args }}"
  when: not k3s_binary.stat.exists

# command      → exécute le script d'installation
# environment  → variables d'environnement passées au script
#                le script officiel k3s lit ces variables pour
#                savoir quelle version installer et avec quelles options

- name: "k3s | Attendre que l'API k3s soit disponible"
  wait_for:
    port: "{{ k3s_api_port }}"
    host: localhost
    timeout: 60
  when: not k3s_binary.stat.exists

# wait_for → attend qu'un port soit ouvert avant de continuer
# timeout  → abandonne après 60 secondes si le port ne répond pas

- name: "k3s | Vérifier que le service k3s tourne"
  service:
    name: k3s
    state: started
    enabled: yes

- name: "k3s | Récupérer le fichier kubeconfig"
  fetch:
    src: /etc/rancher/k3s/k3s.yaml
    dest: ~/.kube/config
    flat: yes
  ignore_errors: yes

# fetch → copie un fichier depuis la machine cible vers le controller
# flat  → copie directement sans recréer l'arborescence
# kubeconfig → fichier de config kubectl pour contrôler le cluster
