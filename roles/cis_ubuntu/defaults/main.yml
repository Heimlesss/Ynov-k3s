---
# ============================================================
# SECTION 1 - Filesystems inutiles
# Blackliste les modules noyau inutiles pour réduire la surface d'attaque
# ============================================================

cis_ubuntu_disable_unused_filesystems: true
cis_ubuntu_unused_filesystems:
  - cramfs
  - freevxfs
  - jffs2
  - hfs
  - hfsplus
  - squashfs
  - udf

# ============================================================
# SECTION 2 - Partition /tmp
# ============================================================

cis_ubuntu_tmp_partition_options: "nodev,nosuid,noexec"

# ============================================================
# SECTION 3 - Réseau
# ============================================================

cis_ubuntu_disable_ipv6: true

# ============================================================
# SECTION 4 - Configuration SSH
# ============================================================

cis_ubuntu_ssh_port: 22
cis_ubuntu_ssh_permit_root_login: "no"
cis_ubuntu_ssh_max_auth_tries: 4
cis_ubuntu_ssh_client_alive_interval: 300
cis_ubuntu_ssh_client_alive_count_max: 0
cis_ubuntu_ssh_login_grace_time: 60

# ============================================================
# SECTION 5 - Bannière SSH
# ============================================================

cis_ubuntu_ssh_banner: "/etc/issue.net"
cis_ubuntu_banner_message: |
  Authorized access only. All activity may be monitored and reported.

# ============================================================
# SECTION 6 - Auditd
# ============================================================

cis_ubuntu_auditd_max_log_file: 8
cis_ubuntu_auditd_max_log_file_action: "keep_logs"

# ============================================================
# SECTION 7 - Sysctl
# ============================================================

cis_ubuntu_sysctl_settings:
  net.ipv4.ip_forward: 0
  net.ipv4.conf.all.send_redirects: 0
  net.ipv4.conf.default.send_redirects: 0
  net.ipv4.conf.all.accept_redirects: 0
  net.ipv4.conf.all.log_martians: 1
  net.ipv4.tcp_syncookies: 1

# ============================================================
# SECTION 8 - Services inutiles
# ============================================================

cis_ubuntu_unnecessary_services:
  - avahi-daemon
  - cups
  - isc-dhcp-server
  - slapd
  - nfs-server
  - rpcbind
  - bind9
  - vsftpd
  - apache2
  - dovecot
  - smbd
  - squid
  - snmpd

# ============================================================
# SECTION 9 - Firewall UFW
# ============================================================

cis_ubuntu_ufw_default_incoming: "deny"
cis_ubuntu_ufw_default_outgoing: "allow"
cis_ubuntu_ufw_allowed_ports:
  - 22
  - 6443

# ============================================================
# SECTION 10 - Politique de mots de passe
# ============================================================

cis_ubuntu_password_max_days: 365
cis_ubuntu_password_min_days: 1
cis_ubuntu_password_warn_age: 7

# ============================================================
# SECTION 11 - Restriction su
# ============================================================

cis_ubuntu_su_restrict_group: "sudo"

# ============================================================
# SECTION 12 - Permissions fichiers critiques
# ============================================================

cis_ubuntu_critical_files:
  - path: /etc/passwd
    owner: root
    group: root
    mode: "0644"
  - path: /etc/shadow
    owner: root
    group: shadow
    mode: "0640"
  - path: /etc/group
    owner: root
    group: root
    mode: "0644"

# ============================================================
# SECTION 13 - Core dumps
# ============================================================

cis_ubuntu_disable_core_dumps: true

# ============================================================
# SECTION 14 - AppArmor
# ============================================================

cis_ubuntu_apparmor_enabled: true

# ============================================================
# SECTION 15 - Logrotate
# ============================================================

cis_ubuntu_logrotate_rotate: 4
cis_ubuntu_logrotate_frequency: "weekly"
