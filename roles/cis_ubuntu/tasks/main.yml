---
# ============================================================
# SECTION 1 - Désactivation des filesystems inutiles
# ============================================================

- name: "CIS 1 | Blacklister les filesystems inutiles"
  ansible.builtin.lineinfile:
    path: /etc/modprobe.d/cis-blacklist.conf
    line: "install {{ item }} /bin/true"
    create: true
    mode: "0644"
  loop: "{{ cis_ubuntu_unused_filesystems }}"
  when: cis_ubuntu_disable_unused_filesystems

# ============================================================
# SECTION 2 - Sécurisation de /tmp
# ============================================================

- name: "CIS 2 | Configurer les options de montage de /tmp"
  ansible.builtin.lineinfile:
    path: /etc/fstab
    regexp: '^tmpfs\s+/tmp'
    line: "tmpfs /tmp tmpfs defaults,{{ cis_ubuntu_tmp_partition_options }} 0 0"
    create: true
    mode: "0644"

# ============================================================
# SECTION 3 - Désactivation IPv6
# ============================================================

- name: "CIS 3 | Désactiver IPv6 via sysctl"
  ansible.posix.sysctl:
    name: "{{ item }}"
    value: "1"
    state: present
    reload: true
  loop:
    - net.ipv6.conf.all.disable_ipv6
    - net.ipv6.conf.default.disable_ipv6
    - net.ipv6.conf.lo.disable_ipv6
  when: cis_ubuntu_disable_ipv6

# ============================================================
# SECTION 4 - Durcissement SSH
# ============================================================

- name: "CIS 4 | Installer OpenSSH server"
  ansible.builtin.apt:
    name: openssh-server
    state: present
    update_cache: true

- name: "CIS 4 | Configurer le port SSH"
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?Port'
    line: "Port {{ cis_ubuntu_ssh_port }}"
  notify: Restart sshd

- name: "CIS 4 | Interdire le login root en SSH"
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?PermitRootLogin'
    line: "PermitRootLogin {{ cis_ubuntu_ssh_permit_root_login }}"
  notify: Restart sshd

- name: "CIS 4 | Limiter les tentatives d'authentification"
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?MaxAuthTries'
    line: "MaxAuthTries {{ cis_ubuntu_ssh_max_auth_tries }}"
  notify: Restart sshd

- name: "CIS 4 | Configurer le timeout d'inactivité"
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?ClientAliveInterval'
    line: "ClientAliveInterval {{ cis_ubuntu_ssh_client_alive_interval }}"
  notify: Restart sshd

- name: "CIS 4 | Configurer le nombre de signaux keepalive"
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?ClientAliveCountMax'
    line: "ClientAliveCountMax {{ cis_ubuntu_ssh_client_alive_count_max }}"
  notify: Restart sshd

- name: "CIS 4 | Configurer le délai de grâce de connexion"
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?LoginGraceTime'
    line: "LoginGraceTime {{ cis_ubuntu_ssh_login_grace_time }}"
  notify: Restart sshd

# ============================================================
# SECTION 5 - Bannière SSH
# ============================================================

- name: "CIS 5 | Déployer le message de bannière"
  ansible.builtin.copy:
    content: "{{ cis_ubuntu_banner_message }}"
    dest: /etc/issue.net
    owner: root
    group: root
    mode: "0644"

- name: "CIS 5 | Activer la bannière dans SSH"
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?Banner'
    line: "Banner {{ cis_ubuntu_ssh_banner }}"
  notify: Restart sshd

# ============================================================
# SECTION 6 - Auditd
# ============================================================

- name: "CIS 6 | Installer auditd"
  ansible.builtin.apt:
    name:
      - auditd
      - audispd-plugins
    state: present

- name: "CIS 6 | Configurer la taille max des logs d'audit"
  ansible.builtin.lineinfile:
    path: /etc/audit/auditd.conf
    regexp: '^max_log_file\s*='
    line: "max_log_file = {{ cis_ubuntu_auditd_max_log_file }}"
  notify: Restart auditd
  when: not ansible_check_mode

- name: "CIS 6 | Configurer l'action à la taille max"
  ansible.builtin.lineinfile:
    path: /etc/audit/auditd.conf
    regexp: '^max_log_file_action\s*='
    line: "max_log_file_action = {{ cis_ubuntu_auditd_max_log_file_action }}"
  notify: Restart auditd
  when: not ansible_check_mode

- name: "CIS 6 | Activer et démarrer auditd"
  ansible.builtin.service:
    name: auditd
    state: started
    enabled: true
  when: not ansible_check_mode

- name: "CIS 6 | Déployer les règles d'audit"
  ansible.builtin.template:
    src: audit.rules.j2
    dest: /etc/audit/rules.d/cis.rules
    owner: root
    group: root
    mode: "0640"
  notify: Restart auditd
  when: not ansible_check_mode

# ============================================================
# SECTION 7 - Paramètres sysctl réseau
# ============================================================

- name: "CIS 7 | Appliquer les paramètres sysctl de sécurité réseau"
  ansible.posix.sysctl:
    name: "{{ item.key }}"
    value: "{{ item.value }}"
    state: present
    reload: true
  loop: "{{ cis_ubuntu_sysctl_settings | dict2items }}"

# ============================================================
# SECTION 8 - Désactivation des services inutiles
# ============================================================

- name: "CIS 8 | Désactiver et stopper les services inutiles"
  ansible.builtin.service:
    name: "{{ item }}"
    state: stopped
    enabled: false
  loop: "{{ cis_ubuntu_unnecessary_services }}"
  failed_when: false

# ============================================================
# SECTION 9 - Pare-feu UFW
# ============================================================

- name: "CIS 9 | Installer UFW"
  ansible.builtin.apt:
    name: ufw
    state: present

- name: "CIS 9 | Politique par défaut - bloquer le trafic entrant"
  community.general.ufw:
    default: "{{ cis_ubuntu_ufw_default_incoming }}"
    direction: incoming

- name: "CIS 9 | Politique par défaut - autoriser le trafic sortant"
  community.general.ufw:
    default: "{{ cis_ubuntu_ufw_default_outgoing }}"
    direction: outgoing

- name: "CIS 9 | Ouvrir les ports autorisés"
  community.general.ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
  loop: "{{ cis_ubuntu_ufw_allowed_ports }}"

- name: "CIS 9 | Activer UFW"
  community.general.ufw:
    state: enabled

# ============================================================
# SECTION 10 - Politique de mots de passe
# ============================================================

- name: "CIS 10 | Configurer la durée de validité des mots de passe"
  ansible.builtin.lineinfile:
    path: /etc/login.defs
    regexp: '^PASS_MAX_DAYS'
    line: "PASS_MAX_DAYS {{ cis_ubuntu_password_max_days }}"

- name: "CIS 10 | Configurer la durée minimale des mots de passe"
  ansible.builtin.lineinfile:
    path: /etc/login.defs
    regexp: '^PASS_MIN_DAYS'
    line: "PASS_MIN_DAYS {{ cis_ubuntu_password_min_days }}"

- name: "CIS 10 | Configurer l'avertissement d'expiration"
  ansible.builtin.lineinfile:
    path: /etc/login.defs
    regexp: '^PASS_WARN_AGE'
    line: "PASS_WARN_AGE {{ cis_ubuntu_password_warn_age }}"

# ============================================================
# SECTION 11 - Restriction de su
# ============================================================

- name: "CIS 11 | Restreindre su au groupe sudo"
  ansible.builtin.lineinfile:
    path: /etc/pam.d/su
    regexp: '^#?auth\s+required\s+pam_wheel'
    line: "auth required pam_wheel.so use_uid group={{ cis_ubuntu_su_restrict_group }}"

# ============================================================
# SECTION 12 - Permissions des fichiers critiques
# ============================================================

- name: "CIS 12 | Appliquer les permissions sur les fichiers critiques"
  ansible.builtin.file:
    path: "{{ item.path }}"
    owner: "{{ item.owner }}"
    group: "{{ item.group }}"
    mode: "{{ item.mode }}"
  loop: "{{ cis_ubuntu_critical_files }}"

# ============================================================
# SECTION 13 - Désactivation des core dumps
# ============================================================

- name: "CIS 13 | Désactiver les core dumps via limits.conf"
  ansible.builtin.lineinfile:
    path: /etc/security/limits.conf
    line: "* hard core 0"
    create: true
    mode: "0644"
  when: cis_ubuntu_disable_core_dumps

- name: "CIS 13 | Désactiver les core dumps via sysctl"
  ansible.posix.sysctl:
    name: fs.suid_dumpable
    value: "0"
    state: present
    reload: true
    mode: "0644"
  when: cis_ubuntu_disable_core_dumps

# ============================================================
# SECTION 14 - AppArmor
# ============================================================

- name: "CIS 14 | Installer AppArmor"
  ansible.builtin.apt:
    name:
      - apparmor
      - apparmor-utils
    state: present
  when: cis_ubuntu_apparmor_enabled

- name: "CIS 14 | Activer et démarrer AppArmor"
  ansible.builtin.service:
    name: apparmor
    state: started
    enabled: true
  when: cis_ubuntu_apparmor_enabled

- name: "CIS 14 | Mettre tous les profils en mode enforce"
  ansible.builtin.command: aa-enforce /etc/apparmor.d/*
  when: cis_ubuntu_apparmor_enabled
  failed_when: false
  changed_when: false

# ============================================================
# SECTION 15 - Logrotate
# ============================================================

- name: "CIS 15 | Installer logrotate"
  ansible.builtin.apt:
    name: logrotate
    state: present

- name: "CIS 15 | Configurer le nombre de rotations à conserver"
  ansible.builtin.lineinfile:
    path: /etc/logrotate.conf
    regexp: '^rotate'
    line: "rotate {{ cis_ubuntu_logrotate_rotate }}"

- name: "CIS 15 | Configurer la fréquence de rotation"
  ansible.builtin.lineinfile:
    path: /etc/logrotate.conf
    regexp: '^(daily|weekly|monthly)'
    line: "{{ cis_ubuntu_logrotate_frequency }}"
