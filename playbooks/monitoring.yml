---
- name: Deploy monitoring stack on k3s
  hosts: targets
  become: true

  tasks:
    - name: Créer le namespace restaurant si absent
      ansible.builtin.command: kubectl get namespace restaurant
      register: ns_check
      failed_when: false
      changed_when: false

    - name: Créer namespace restaurant
      ansible.builtin.command: kubectl create namespace restaurant
      when: ns_check.rc != 0
      changed_when: true

    - name: Créer le fichier manifest du secret Grafana
      ansible.builtin.copy:
        dest: /tmp/grafana-secret.yaml
        mode: '0600'
        content: |
          apiVersion: v1
          kind: Secret
          metadata:
            name: grafana-credentials
            namespace: restaurant
          type: Opaque
          stringData:
            username: "{{ grafana_user }}"
            password: "{{ grafana_password }}"

    - name: Appliquer le secret Grafana
      ansible.builtin.command: kubectl apply -f /tmp/grafana-secret.yaml
      changed_when: true

    - name: Supprimer le fichier secret temporaire
      ansible.builtin.file:
        path: /tmp/grafana-secret.yaml
        state: absent

    - name: Copier les manifests monitoring
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../k8s/monitoring/"
        dest: /home/ansible/monitoring/
        owner: ansible
        group: ansible
        mode: '0644'

    - name: Appliquer le ConfigMap Prometheus
      ansible.builtin.command: kubectl apply -f /home/ansible/monitoring/prometheus-config.yaml
      changed_when: true

    - name: Appliquer Prometheus
      ansible.builtin.command: kubectl apply -f /home/ansible/monitoring/prometheus.yaml
      changed_when: true

    - name: Appliquer Pushgateway
      ansible.builtin.command: kubectl apply -f /home/ansible/monitoring/pushgateway.yaml
      changed_when: true

    - name: Appliquer Grafana
      ansible.builtin.command: kubectl apply -f /home/ansible/monitoring/grafana.yaml
      changed_when: true

    - name: Appliquer node-exporter
      ansible.builtin.command: kubectl apply -f /home/ansible/monitoring/node-exporter.yaml
      changed_when: true

    - name: Attendre que Prometheus soit Ready
      ansible.builtin.command: kubectl rollout status deployment/prometheus -n restaurant --timeout=120s
      changed_when: false

    - name: Attendre que Pushgateway soit Ready
      ansible.builtin.command: kubectl rollout status deployment/pushgateway -n restaurant --timeout=120s
      changed_when: false

    - name: Attendre que Grafana soit Ready
      ansible.builtin.command: kubectl rollout status deployment/grafana -n restaurant --timeout=120s
      changed_when: false

    - name: Tuer les port-forwards Grafana existants
      ansible.builtin.command: pkill -f "kubectl port-forward.*grafana"
      failed_when: false
      changed_when: true

    - name: Lancer le port-forward Grafana
      ansible.builtin.command: >
        nohup kubectl port-forward -n restaurant service/grafana 3000:3000
        --address=0.0.0.0
      async: 10
      poll: 0
      changed_when: true

    - name: Attendre que Grafana soit accessible sur le port 3000
      ansible.builtin.wait_for:
        host: 0.0.0.0
        port: 3000
        timeout: 30
